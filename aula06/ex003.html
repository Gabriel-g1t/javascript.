<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(68, 68, 141);
            color: rgba(202, 198, 198, 0.908);
        }

        h1 {
            font-size: 70px;
            font-weight: bolder;
            color: rgb(215, 0, 0);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição"</p>
    
    <script>
        var n1 = Number(window.prompt('Digite um número: ')) // string
        var n2 = Number(window.prompt('Digite outro número: ')) // string
        var s = n1 + n2
        window.alert(`A soma de ${n1} e ${n2} é igual a ${s}`)
        //(string + string) para concatenação
        //(number + number) para adição
    </script>
</body>
</html>
