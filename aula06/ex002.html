<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(68, 68, 141);
            color: rgba(202, 198, 198, 0.908);
        }

        h1 {
            font-size: 70px;
            font-weight: bolder;
            color: rgb(215, 0, 0);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição"</p>
    
    <script>
        var nome = window.prompt('Qual é seu nome?') /* Pergunta */
        window.alert('É um grande prazer te conhecer, ' + nome + '!') // Concatenação
    </script>
</body>
</html>
